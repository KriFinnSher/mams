<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAMS Login</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --text: #17212b;
        --muted: #5f6b7a;
        --border: #d6dce3;
        --primary: #0f62fe;
        --primary-hover: #0353e9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 60%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(23, 33, 43, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
      }

      input {
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
      }

      button {
        margin-top: 4px;
        height: 42px;
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-hover);
      }

      .status {
        margin-top: 12px;
        min-height: 20px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Login</h1>
      <p>Sign in to MAMS.</p>
      <form id="login-form">
        <label>
          Login
          <input type="text" name="login" autocomplete="username" required />
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Sign in</button>
      </form>
      <div id="status" class="status"></div>
    </main>
    <script>
      const form = document.getElementById("login-form");
      const status = document.getElementById("status");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          login: form.login.value,
          password: form.password.value,
        };

        status.textContent = "Signing in...";

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            status.textContent = "Login failed.";
            return;
          }

          const data = await response.json();
          if (!data.token) {
            status.textContent = "Token is missing in response.";
            return;
          }

          localStorage.setItem("mams_token", data.token);
          status.textContent = "Token saved to localStorage.";
        } catch {
          status.textContent = "Cannot reach backend.";
        }
      });
    </script>
  </body>
</html>

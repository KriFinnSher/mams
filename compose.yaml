services:
  postgres:
    image: postgres:16-alpine
    container_name: mams-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mams
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d mams"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mams-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8081"
      POSTGRES_DSN: postgres://app_user:app_password@postgres:5432/mams?sslmode=disable
      JWT_SECRET: 8c4f7a2d1b9e3c6f5a0d2e7b1c4f9a6d3e8b2c5f7a1d4e9c6b0f2a3d5e7c1b4
      JWT_TTL: "3600"
    ports:
      - "8081:8081"

  nginx:
    image: nginx:1.27-alpine
    container_name: mams-nginx
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"

volumes:
  postgres_data:

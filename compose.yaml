services:
  postgres:
    image: postgres:16-alpine
    container_name: mams-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mams
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d mams"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:8.0
    container_name: mams-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mams-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8081"
      POSTGRES_DSN: postgres://app_user:app_password@postgres:5432/mams?sslmode=disable
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: mams
      MONGO_LOGS_COLLECTION: logs
      JWT_SECRET: 8c4f7a2d1b9e3c6f5a0d2e7b1c4f9a6d3e8b2c5f7a1d4e9c6b0f2a3d5e7c1b4
      JWT_TTL: "3600"
      KUBE_CONFIG_PATH: /root/.kube/config
    ports:
      - "8081:8081"
    volumes:
      - ${HOME}/.kube:/root/.kube:ro

  frontend:
    image: node:22-alpine
    container_name: mams-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: mams-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"

volumes:
  postgres_data:
  mongo_data:
  frontend_node_modules:
